<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>html{visibility:hidden}</style>
    <link href="/styles.css?v=4.5" rel="stylesheet" onload="document.documentElement.style.visibility='visible'" onerror="document.documentElement.style.visibility='visible'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-br from-green-400 to-blue-600 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all hover:scale-[1.01] duration-300">
        <div class="bg-gradient-to-r from-blue-500 to-green-500 p-6 text-center">
             <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg overflow-hidden">
                <img id="register-logo" class="w-16 h-16 object-contain hidden" alt="Logo">
                <span id="register-logo-fallback" class="text-4xl">🚀</span>
            </div>
            <h1 class="text-3xl font-bold text-white mb-1">Daftar <span id="register-app-name">Wahaku</span></h1>
            <p class="text-blue-100 text-sm">Bergabung dan mulai otomatisasi hari ini</p>
        </div>

        <div class="p-8">
            <!-- Register Form -->
            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">Nomor WhatsApp (Wajib)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fab fa-whatsapp"></i>
                        </span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="username" type="tel" placeholder="Contoh: 08123456789" required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2" for="email">Email (Wajib)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="email" type="email" placeholder="contoh@email.com" required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="password" type="password" placeholder="********" required>
                    </div>
                </div>

                <button class="w-full bg-gradient-to-r from-blue-600 to-green-600 hover:from-blue-700 hover:to-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transform transition-transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" type="submit">
                    Daftar Sekarang
                </button>
            </form>

            <!-- OTP Form (Hidden Initially) -->
            <form id="otpForm" class="space-y-6 hidden">
                 <div class="text-center bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                     <p class="text-blue-800 text-sm font-medium">
                         <i class="fas fa-check-circle mr-2"></i>Kode OTP terkirim ke WhatsApp
                     </p>
                 </div>
                 
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2 text-center" for="otp">Masukkan Kode OTP</label>
                    <div class="relative">
                         <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-key"></i>
                        </span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center text-2xl tracking-[0.5em] font-mono" id="otp" type="text" placeholder="••••••" maxlength="6" required autocomplete="one-time-code">
                    </div>
                </div>

                <button class="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transform transition-transform hover:-translate-y-0.5" type="submit">
                    Verifikasi & Login
                </button>
                
                <div class="text-center mt-4">
                    <p class="text-sm text-gray-600">
                        Belum terima kode? 
                        <button type="button" id="resendOtpBtn" class="text-blue-600 hover:text-blue-800 font-bold disabled:text-gray-400 ml-1" onclick="resendOTP()">
                            Kirim Ulang
                        </button>
                    </p>
                    <p id="countdown" class="text-xs text-gray-500 mt-2 hidden flex items-center justify-center">
                        <i class="fas fa-clock mr-1"></i> Tunggu <span id="timer" class="mx-1 font-bold">60</span> detik
                    </p>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-600">
                    Sudah punya akun? 
                    <a href="/login" class="text-blue-600 hover:text-blue-800 font-bold hover:underline">Masuk di sini</a>
                </p>
            </div>
        </div>
        <div class="bg-gray-50 p-4 text-center">
            <p class="text-xs text-gray-400">&copy; 2026 Akhimedia. All rights reserved.</p>
        </div>
    </div>

    <!-- CSRF Protection: Override fetch to include token -->
    <script>
        (async function() {
            try {
                const res = await fetch('/api/public/branding', { credentials: 'include' });
                if (!res.ok) return;
                const data = await res.json();
                if (!data || !data.success) return;

                const name = (typeof data.name === 'string' ? data.name.trim() : '') || 'Wahaku';
                const logo = (typeof data.logo === 'string' ? data.logo.trim() : '');

                document.title = 'Daftar Akun - ' + name;
                const nameEl = document.getElementById('register-app-name');
                if (nameEl) nameEl.textContent = name;

                const logoImg = document.getElementById('register-logo');
                const fallback = document.getElementById('register-logo-fallback');
                if (logoImg && fallback) {
                    if (logo) {
                        logoImg.src = logo;
                        logoImg.classList.remove('hidden');
                        fallback.classList.add('hidden');
                    } else {
                        logoImg.classList.add('hidden');
                        fallback.classList.remove('hidden');
                    }
                }
            } catch (e) {}
        })();

        function getCookie(name) {
            let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
            options = options || {};
            const method = options.method ? options.method.toUpperCase() : 'GET';
            if (['POST', 'PUT', 'DELETE', 'PATCH'].includes(method)) {
                options.headers = options.headers || {};
                if (!options.headers['X-CSRF-Token']) {
                    const token = getCookie('csrf_token');
                    if (token) options.headers['X-CSRF-Token'] = token;
                }
            }
            return originalFetch(url, options);
        };
    </script>

    <script>
        let registeredPhone = '';
        let resendTimer = null;

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Pendaftaran Berhasil',
                        text: 'Silakan login dengan akun Anda.',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '/login';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal Mendaftar',
                        text: data.message || 'Terjadi kesalahan saat mendaftar.'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({ icon: 'error', title: 'Error', text: 'Terjadi kesalahan sistem' });
            }
        });

        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const otp = document.getElementById('otp').value;

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: registeredPhone, otp })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Verifikasi Berhasil',
                        text: 'Mengalihkan ke dashboard...',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '/dashboard';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal Verifikasi',
                        text: data.message || 'Kode OTP salah'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({ icon: 'error', title: 'Error', text: 'Terjadi kesalahan sistem' });
            }
        });

        function startResendTimer() {
            const btn = document.getElementById('resendOtpBtn');
            const countdownEl = document.getElementById('countdown');
            const timerEl = document.getElementById('timer');
            
            btn.disabled = true;
            countdownEl.classList.remove('hidden');
            
            let timeLeft = 60;
            timerEl.innerText = timeLeft;
            
            if (resendTimer) clearInterval(resendTimer);
            
            resendTimer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(resendTimer);
                    btn.disabled = false;
                    countdownEl.classList.add('hidden');
                }
            }, 1000);
        }

        async function resendOTP() {
            if (!registeredPhone) return;
            
            try {
                const response = await fetch('/api/auth/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: registeredPhone })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'OTP Dikirim',
                        text: 'Kode OTP baru telah dikirim ke WhatsApp Anda.',
                        timer: 2000,
                        showConfirmButton: false
                    });
                    startResendTimer();
                } else {
                    Swal.fire('Gagal', data.message || 'Gagal mengirim ulang OTP', 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Terjadi kesalahan koneksi', 'error');
            }
        }
    </script>
</body>
</html>
